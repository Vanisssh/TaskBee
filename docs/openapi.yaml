openapi: 3.0.3
info:
  title: TaskBee API
  description: |
    REST API платформы быстрого поиска и заказа профессиональных услуг (ЛР2–3).
    Валидация запросов — Marshmallow; интерактивная документация Swagger UI: `http://localhost:5000/api/docs/`.
    Базовый URL ресурсов v1: `http://localhost:5000/api/v1` (Flask / Gunicorn).
  version: 1.0.0

servers:
  - url: http://localhost:5000/api/v1
    description: Локальный сервер

paths:
  /categories:
    get:
      summary: Список категорий услуг
      operationId: listCategories
      tags: [Categories]
      responses:
        '200':
          description: Успешно
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/ServiceCategory' }
    post:
      summary: Создать категорию
      operationId: createCategory
      tags: [Categories]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, slug]
              properties:
                name: { type: string, maxLength: 255 }
                slug: { type: string, maxLength: 255 }
      responses:
        '201':
          description: Создано
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/ServiceCategory' }
        '422':
          description: Ошибка валидации

  /categories/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: integer }
    get:
      summary: Категория по ID (с услугами)
      operationId: showCategory
      tags: [Categories]
      responses:
        '200':
          description: Успешно
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/ServiceCategoryWithServices' }
        '404':
          description: Не найдено
    put:
      summary: Обновить категорию
      operationId: updateCategory
      tags: [Categories]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string, maxLength: 255 }
                slug: { type: string, maxLength: 255 }
      responses:
        '200':
          description: Успешно
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/ServiceCategory' }
        '404':
          description: Не найдено
        '422':
          description: Ошибка валидации
    delete:
      summary: Удалить категорию
      operationId: destroyCategory
      tags: [Categories]
      responses:
        '204':
          description: Удалено
        '404':
          description: Не найдено

  /services:
    get:
      summary: Список услуг
      operationId: listServices
      tags: [Services]
      parameters:
        - name: category_id
          in: query
          schema: { type: integer }
          description: Фильтр по ID категории
      responses:
        '200':
          description: Успешно
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Service' }
    post:
      summary: Создать услугу
      operationId: createService
      tags: [Services]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [service_category_id, name]
              properties:
                service_category_id: { type: integer }
                name: { type: string, maxLength: 255 }
                description: { type: string, nullable: true }
      responses:
        '201':
          description: Создано
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Service' }
        '422':
          description: Ошибка валидации

  /services/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: integer }
    get:
      summary: Услуга по ID
      operationId: showService
      tags: [Services]
      responses:
        '200':
          description: Успешно
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Service' }
        '404':
          description: Не найдено
    put:
      summary: Обновить услугу
      operationId: updateService
      tags: [Services]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                service_category_id: { type: integer }
                name: { type: string, maxLength: 255 }
                description: { type: string, nullable: true }
      responses:
        '200':
          description: Успешно
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Service' }
        '404':
          description: Не найдено
        '422':
          description: Ошибка валидации
    delete:
      summary: Удалить услугу
      operationId: destroyService
      tags: [Services]
      responses:
        '204':
          description: Удалено
        '404':
          description: Не найдено

  /orders:
    get:
      summary: Список заказов
      operationId: listOrders
      tags: [Orders]
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [new, assigned, in_progress, completed, cancelled]
      responses:
        '200':
          description: Успешно
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Order' }
    post:
      summary: Создать заказ
      operationId: createOrder
      tags: [Orders]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [client_id, service_id]
              properties:
                client_id: { type: integer }
                service_id: { type: integer }
                address: { type: string, nullable: true }
                description: { type: string, nullable: true }
      responses:
        '201':
          description: Создано
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Order' }
        '422':
          description: Ошибка валидации

  /orders/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: integer }
    get:
      summary: Заказ по ID (с связями)
      operationId: showOrder
      tags: [Orders]
      responses:
        '200':
          description: Успешно
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Order' }
        '404':
          description: Не найдено
    put:
      summary: Обновить заказ
      operationId: updateOrder
      tags: [Orders]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                specialist_id: { type: integer, nullable: true }
                status: { type: string, enum: [new, assigned, in_progress, completed, cancelled] }
                address: { type: string, nullable: true }
                description: { type: string, nullable: true }
      responses:
        '200':
          description: Успешно
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Order' }
        '404':
          description: Не найдено
        '422':
          description: Ошибка валидации
    delete:
      summary: Удалить заказ
      operationId: destroyOrder
      tags: [Orders]
      responses:
        '204':
          description: Удалено
        '404':
          description: Не найдено

  /reviews:
    get:
      summary: Список отзывов
      operationId: listReviews
      tags: [Reviews]
      responses:
        '200':
          description: Успешно
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Review' }
    post:
      summary: Создать отзыв
      operationId: createReview
      tags: [Reviews]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [order_id, user_id, rating]
              properties:
                order_id: { type: integer }
                user_id: { type: integer }
                rating: { type: integer, minimum: 1, maximum: 5 }
                comment: { type: string, nullable: true }
      responses:
        '201':
          description: Создано
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Review' }
        '422':
          description: Ошибка валидации (в т.ч. заказ не в статусе completed)

  /reviews/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: integer }
    get:
      summary: Отзыв по ID
      operationId: showReview
      tags: [Reviews]
      responses:
        '200':
          description: Успешно
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Review' }
        '404':
          description: Не найдено
    put:
      summary: Обновить отзыв
      operationId: updateReview
      tags: [Reviews]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                rating: { type: integer, minimum: 1, maximum: 5 }
                comment: { type: string, nullable: true }
      responses:
        '200':
          description: Успешно
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Review' }
        '404':
          description: Не найдено
        '422':
          description: Ошибка валидации
    delete:
      summary: Удалить отзыв
      operationId: destroyReviewById
      tags: [Reviews]
      responses:
        '204':
          description: Удалено
        '404':
          description: Не найдено

  /users:
    get:
      summary: Список пользователей (клиентов)
      operationId: listUsers
      tags: [Users]
      responses:
        '200':
          description: Успешно
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/User' }
    post:
      summary: Создать пользователя
      operationId: createUser
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email]
              properties:
                name: { type: string, maxLength: 255 }
                email: { type: string, format: email }
                password_hash: { type: string, nullable: true, description: заглушка в учебном проекте }
      responses:
        '201':
          description: Создано
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/User' }
        '422':
          description: Ошибка валидации

  /users/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: integer }
    get:
      summary: Пользователь по ID
      operationId: showUser
      tags: [Users]
      responses:
        '200':
          description: Успешно
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/User' }
        '404':
          description: Не найдено

  /specialists:
    get:
      summary: Список исполнителей (по убыванию рейтинга)
      operationId: listSpecialists
      tags: [Specialists]
      responses:
        '200':
          description: Успешно
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Specialist' }
    post:
      summary: Создать профиль исполнителя
      operationId: createSpecialist
      tags: [Specialists]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [user_id]
              properties:
                user_id: { type: integer }
                bio: { type: string, nullable: true }
                rating_avg:
                  type: number
                  format: float
                  minimum: 0
                  maximum: 5
                  default: 0
                  description: денормализованный средний рейтинг
      responses:
        '201':
          description: Создано
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Specialist' }
        '422':
          description: Ошибка валидации

  /specialists/search:
    get:
      summary: Подбор исполнителей (мин. рейтинг, категория, лимит)
      operationId: searchSpecialists
      tags: [Specialists]
      parameters:
        - name: min_rating
          in: query
          schema: { type: number, minimum: 0, maximum: 5 }
          description: Минимальный средний рейтинг (0–5)
        - name: category_id
          in: query
          schema: { type: integer }
          description: Исполнители с завершёнными заказами в этой категории услуг
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
      responses:
        '200':
          description: Успешно
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Specialist' }
                  meta:
                    type: object
                    properties:
                      count: { type: integer }
                      limit: { type: integer }
        '422':
          description: Некорректные параметры (например min_rating)

  /specialists/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema: { type: integer }
    get:
      summary: Исполнитель по ID
      operationId: showSpecialist
      tags: [Specialists]
      responses:
        '200':
          description: Успешно
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Specialist' }
        '404':
          description: Не найдено
    put:
      summary: Обновить исполнителя
      operationId: updateSpecialist
      tags: [Specialists]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                bio: { type: string, nullable: true }
                rating_avg: { type: number, minimum: 0, maximum: 5, nullable: true }
      responses:
        '200':
          description: Успешно
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Specialist' }
        '404':
          description: Не найдено
        '422':
          description: Ошибка валидации
    delete:
      summary: Удалить исполнителя
      operationId: destroySpecialist
      tags: [Specialists]
      responses:
        '204':
          description: Удалено
        '404':
          description: Не найдено

  /stats/summary:
    get:
      summary: Сводные метрики платформы (заказы по статусам, справочники, средние рейтинги)
      operationId: statsSummary
      tags: [Stats]
      responses:
        '200':
          description: Успешно
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/PlatformSummary' }

components:
  schemas:
    ServiceCategory:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        slug: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    ServiceCategoryWithServices:
      allOf:
        - { $ref: '#/components/schemas/ServiceCategory' }
        - type: object
          properties:
            services:
              type: array
              items: { $ref: '#/components/schemas/Service' }

    Service:
      type: object
      properties:
        id: { type: integer }
        service_category_id: { type: integer }
        name: { type: string }
        description: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        category: { $ref: '#/components/schemas/ServiceCategory' }

    Order:
      type: object
      properties:
        id: { type: integer }
        client_id: { type: integer }
        service_id: { type: integer }
        specialist_id: { type: integer, nullable: true }
        status: { type: string, enum: [new, assigned, in_progress, completed, cancelled] }
        address: { type: string, nullable: true }
        description: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        service: { $ref: '#/components/schemas/Service' }
        client: { type: object, properties: { id: { type: integer }, name: { type: string } } }
        specialist: { type: object, nullable: true }

    Review:
      type: object
      properties:
        id: { type: integer }
        order_id: { type: integer }
        user_id: { type: integer }
        rating: { type: integer, minimum: 1, maximum: 5 }
        comment: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        order: { type: object }
        user: { type: object, properties: { id: { type: integer }, name: { type: string } } }

    User:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        email: { type: string, format: email }

    Specialist:
      type: object
      properties:
        id: { type: integer }
        user_id: { type: integer }
        bio: { type: string, nullable: true }
        rating_avg: { type: number, format: float }
        user:
          type: object
          nullable: true
          properties:
            id: { type: integer }
            name: { type: string }
            email: { type: string, format: email }

    PlatformSummary:
      type: object
      properties:
        orders_by_status:
          type: object
          additionalProperties: { type: integer }
          description: Счётчики по статусам заказа
        total_orders: { type: integer }
        total_users: { type: integer }
        total_specialists: { type: integer }
        total_service_categories: { type: integer }
        total_services: { type: integer }
        total_reviews: { type: integer }
        avg_review_rating: { type: number, format: float, nullable: true }
        avg_specialist_rating: { type: number, format: float, nullable: true }

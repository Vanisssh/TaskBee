# TaskBee — ЛР1: Docker Compose (PostgreSQL, Flask backend, frontend, Redis)
# ИС быстрого поиска и заказа профессиональных услуг

services:
  db:
    image: postgres:18
    container_name: taskbee-db
    environment:
      POSTGRES_USER: ${DB_USER:-taskbee_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-taskbee_secret}
      POSTGRES_DB: ${DB_NAME:-taskbee}
    volumes:
      - pgdata:/var/lib/postgresql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "${DB_PORT:-5432}:5432"
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: taskbee-redis
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redisdata:/data
    networks:
      - app-network

  consul:
    image: bitnami/consul:1.17
    container_name: taskbee-consul
    ports:
      - "8500:8500"
      - "8600:8600/udp"
    command: consul agent -dev -client=0.0.0.0 -ui
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: taskbee-backend
    ports:
      - "${BACKEND_PORT:-5000}:5000"
    environment:
      POSTGRES_USER: ${DB_USER:-taskbee_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-taskbee_secret}
      POSTGRES_DB: ${DB_NAME:-taskbee}
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      RATELIMIT_STORAGE_URL: ${RATELIMIT_STORAGE_URL:-redis://redis:6379/1}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: taskbee-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend
    networks:
      - app-network

volumes:
  pgdata:
  redisdata:

networks:
  app-network:
    driver: bridge

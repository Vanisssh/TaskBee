
# Сервисы: PostgreSQL, Laravel (backend), Vue/Vite (frontend), Redis (кэш/очереди)

services:
  db:
    image: postgres:18
    container_name: taskbee-db
    environment:
      POSTGRES_USER: ${DB_USERNAME:-taskbee_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-taskbee_secret}
      POSTGRES_DB: ${DB_DATABASE:-taskbee}
    volumes:
      - pgdata:/var/lib/postgresql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "${DB_PORT:-5432}:5432"
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: taskbee-redis
    volumes:
      - redisdata:/data
    networks:
      - app-network
    # Адаптация под тематику: кэш поиска исполнителей, очереди заказов, сессии

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: taskbee-backend
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      APP_KEY: ${APP_KEY:-}
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_URL: http://localhost:${APP_PORT:-8000}
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-taskbee}
      DB_USERNAME: ${DB_USERNAME:-taskbee_user}
      DB_PASSWORD: ${DB_PASSWORD:-taskbee_secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_STORE: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      VITE_DEV_SERVER_URL: http://localhost:5173
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - app-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: taskbee-frontend
    ports:
      - "5173:5173"
    environment:
      VITE_DEV_SERVER_HOST: 0.0.0.0
      VITE_APP_NAME: "${APP_NAME:-TaskBee}"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - app-network

volumes:
  pgdata:
  redisdata:

networks:
  app-network:
    driver: bridge
